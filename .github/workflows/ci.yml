name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: kstransport_test
          POSTGRES_USER: kstransport
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kstransport -d kstransport_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Init test database
        run: PGPASSWORD=testpassword psql -h localhost -U kstransport -d kstransport_test -f ../database/init.sql
      - name: Run migrations
        run: PGPASSWORD=testpassword psql -h localhost -U kstransport -d kstransport_test -f ../database/startup-migrations.sql
      - name: Start server and smoke-test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://kstransport:testpassword@localhost:5432/kstransport_test
          JWT_SECRET: ci-test-jwt-secret-not-for-production
        run: |
          node server.js &
          sleep 3
          curl -sf http://localhost:3001/health | grep -q '"status":"OK"'
          echo "Health check passed"
          kill %1

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: /api

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t kstransport-backend ./backend
      - name: Build frontend image
        run: docker build -t kstransport-frontend ./frontend
