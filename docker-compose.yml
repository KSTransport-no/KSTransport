services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kstransport}
      POSTGRES_USER: ${POSTGRES_USER:-kstransport}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=${POSTGRES_PASSWORD} pg_isready -U ${POSTGRES_USER:-kstransport} -d ${POSTGRES_DB:-kstransport}"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrations:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kstransport}
      POSTGRES_USER: ${POSTGRES_USER:-kstransport}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      PGPASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - ./database/startup-migrations.sql:/startup-migrations.sql
    command: >
      bash -c "
        echo '🔄 Starter migrasjonsprosess...'
        until pg_isready -h postgres -p 5432 -U ${POSTGRES_USER:-kstransport}; do
          echo '⏳ Venter på postgres...'
          sleep 2
        done
        echo '✅ PostgreSQL er klar!'
        echo '📋 Kjører startup-migrations.sql...'
        psql -h postgres -U ${POSTGRES_USER:-kstransport} -d ${POSTGRES_DB:-kstransport} -f /startup-migrations.sql -v ON_ERROR_STOP=1
        if [ $$? -eq 0 ]; then
          echo '✅ Migrasjoner fullført!'
        else
          echo '❌ Feil ved kjøring av migrasjoner!'
          exit 1
        fi
      "
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"  # Ikke restart hvis den feiler - la backend vente

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-kstransport}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-kstransport}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      SENTRY_DSN_BACKEND: ${SENTRY_DSN_BACKEND:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-development}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-1.0.0}
      TOMTOM_API_KEY: ${TOMTOM_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-noreply@kstransport.no}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3002}
    depends_on:
      migrations:
        condition: service_completed_successfully
    volumes:
      - ./backend/uploads:/app/uploads
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  frontend:
    build: 
      context: ./frontend
      dockerfile: ${FRONTEND_DOCKERFILE:-Dockerfile}
    ports:
      - "3002:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      NEXT_PUBLIC_SENTRY_ENVIRONMENT: ${NEXT_PUBLIC_SENTRY_ENVIRONMENT:-development}
      NEXT_PUBLIC_SENTRY_RELEASE: ${NEXT_PUBLIC_SENTRY_RELEASE:-1.0.0}
    depends_on:
      backend:
        condition: service_started
    # No volumes in server mode to keep node_modules inside the image
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  adminer:
    image: adminer:latest
    ports:
      - "8080:8080" # Map host port 8080 to container port 8080
    depends_on:
      - backend

volumes:
  postgres_data:
